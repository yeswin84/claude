<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 4시간 실무 가이드 v2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
:root {
  --brand:       #8B1C2B;
  --brand-soft:  #b94556;
  --bg:          #FAF5EA;
  --panel:       #FFFFFF;
  --text:        #2C2626;
  --muted:       #6B5E5A;
  --border:      #E5DFD4;
  --sidebar:     #FDF7EC;
  --hover:       #F2EADC;
  --sidebar-bg:  #1f1719;
  --sidebar-hov: #2a2022;
  --sidebar-act: #2e2325;
  --sidebar-txt: #e5dcc8;
  --sidebar-dim: #8a7f72;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 15px; line-height: 1.65; letter-spacing: -0.01em;
}
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 300px; background: var(--sidebar-bg); color: var(--sidebar-txt);
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  padding: 22px 0 40px; flex-shrink: 0;
}
.brand {
  padding: 0 22px 22px; display: flex; gap: 12px; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 12px;
}
.logo {
  width: 46px; height: 46px; background: var(--brand); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 14px; flex-shrink: 0;
}
.brand-title { font-weight: 700; color: #fff; font-size: 15px; }
.brand-sub   { font-size: 12px; color: var(--sidebar-dim); margin-top: 3px; }

.nav-chapter { padding: 2px 12px; }
.nav-chapter-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 10px; cursor: pointer; user-select: none;
  border-radius: 6px; transition: background .15s;
}
.nav-chapter-header:hover { background: var(--sidebar-hov); }
.ch-num {
  background: var(--brand); color: #fff; font-size: 10px; font-weight: 700;
  padding: 3px 7px; border-radius: 3px; letter-spacing: .04em; flex-shrink: 0;
}
.ch-title { font-size: 13.5px; color: var(--sidebar-txt); flex: 1; font-weight: 500; }
.ch-time  { font-size: 11px; color: var(--sidebar-dim); }
.ch-caret { color: var(--sidebar-dim); transition: transform .2s; font-size: 10px; }
.nav-chapter.open .ch-caret { transform: rotate(180deg); }
.sections { padding-left: 14px; display: none; margin: 2px 0 8px; }
.nav-chapter.open .sections { display: block; }

.section-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px 8px 14px; cursor: pointer; border-radius: 4px;
  font-size: 13px; color: var(--sidebar-txt); transition: background .15s;
  border-left: 2px solid transparent;
}
.section-item:hover { background: var(--sidebar-hov); }
.section-item.active {
  background: var(--sidebar-act); border-left: 2px solid var(--brand-soft); color: #fff;
}
.section-item .dot { width: 5px; height: 5px; background: var(--brand-soft); border-radius: 50%; flex-shrink: 0; }
.section-item .title { flex: 1; }

.tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 700; letter-spacing: .02em; flex-shrink: 0; }
.tag-plat     { background: #c5dcc8; color: #2f5534; }
.tag-concept  { background: #c5d5e4; color: #2a4664; }
.tag-practice { background: #efd9a8; color: #7a5a18; }
.tag-workshop { background: #dcc8e4; color: #5a2a74; }
.tag-opening  { background: #f0c8c8; color: #7a1a1a; }

.main { flex: 1; min-width: 0; }
.top {
  background: var(--bg); padding: 18px 40px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.breadcrumb { font-size: 14px; color: var(--muted); }
.breadcrumb .current { color: var(--text); font-weight: 600; }
.breadcrumb span + span::before { content: "›"; margin: 0 8px; color: var(--muted); }
.font-ctrl { display: flex; background: #fff; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
.font-ctrl button {
  background: transparent; border: none; padding: 6px 12px; cursor: pointer;
  font-size: 12px; color: var(--muted);
}
.font-ctrl button.active { background: var(--text); color: #fff; }

.content { padding: 40px; max-width: 980px; }

h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -.02em; }
h2 { font-size: 20px; font-weight: 700; margin: 32px 0 12px; letter-spacing: -.02em; }
h3 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; }
p  { margin: 8px 0; }
strong { font-weight: 700; color: var(--text); }

.page-desc { font-size: 15.5px; color: var(--muted); margin-bottom: 24px; line-height: 1.75; }
.section-heading {
  border-bottom: 2px solid var(--brand); padding-bottom: 6px;
  font-size: 18px; font-weight: 700; margin: 36px 0 16px;
  display: inline-block; color: var(--text);
}
.callout {
  background: #fff; border-left: 4px solid var(--brand);
  padding: 16px 20px; border-radius: 6px; margin: 20px 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.callout-title { font-weight: 700; margin-bottom: 6px; color: var(--brand); font-size: 14px; }

.card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; margin: 16px 0; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.card-title { font-weight: 700; margin-bottom: 8px; font-size: 16px; }
.card-desc  { color: var(--muted); font-size: 14px; }

.prompt-block { background: #fcfaf5; border: 1px solid var(--border); border-radius: 8px; margin: 12px 0 20px; overflow: hidden; }
.prompt-header { background: var(--bg); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.prompt-label { font-size: 13px; font-weight: 600; color: var(--text); }
.copy-btn { background: var(--brand); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: background .15s; }
.copy-btn:hover { background: var(--brand-soft); }
.copy-btn.copied { background: #5a7c5a; }
.prompt-body { padding: 18px 22px; white-space: pre-wrap; font-family: 'Pretendard Variable', monospace; font-size: 13.5px; line-height: 1.75; color: #2c2626; }

.file-card {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; background: #fff;
  border: 1px solid var(--border); border-radius: 8px; margin: 10px 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.04); text-decoration: none; color: inherit;
}
.file-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.file-info p  { font-size: 13px; color: var(--muted); margin: 0; }
.dl-btn { background: var(--brand); color: #fff; border: none; padding: 10px 22px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 700; text-decoration: none; display: inline-block; }
.dl-btn:hover { background: var(--brand-soft); }

ul { padding-left: 22px; margin: 10px 0; }
li { margin: 6px 0; }

.demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin: 14px 0; }
.demo-topic { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.demo-topic .tt { font-weight: 700; margin-bottom: 6px; color: var(--text); font-size: 14px; }
.demo-topic .dd { font-size: 13px; color: var(--muted); line-height: 1.6; }

table { width: 100%; border-collapse: collapse; margin: 14px 0; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
th { background: var(--bg); font-weight: 700; font-size: 13px; }
tr:last-child td { border-bottom: none; }

.pills { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 20px; }
.pill  { padding: 4px 12px; background: #fff; border: 1px solid var(--border); border-radius: 14px; font-size: 12px; color: var(--muted); }
.pill.primary { background: var(--brand); color: #fff; border-color: var(--brand); }

.step-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 16px 0; }
.step-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.step-num { width: 28px; height: 28px; background: var(--brand); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.step-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.step-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

.footer-nav { display: flex; justify-content: space-between; margin-top: 50px; padding-top: 24px; border-top: 1px solid var(--border); gap: 12px; }
.nav-btn { background: #fff; border: 1px solid var(--border); padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; color: var(--text); font-weight: 600; transition: all .15s; flex: 1; max-width: 48%; }
.nav-btn:hover:not(.disabled) { background: var(--brand); color: #fff; border-color: var(--brand); }
.nav-btn.disabled { opacity: .4; cursor: not-allowed; }
.nav-btn.next { text-align: right; }

.hamburger { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); }
@media (max-width: 900px) {
  .sidebar { position: fixed; left: -300px; z-index: 100; transition: left .25s; }
  .sidebar.open { left: 0; }
  .content { padding: 24px; }
  .top { padding: 16px 20px; }
  .hamburger { display: block; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">CL</div>
      <div>
        <div class="brand-title">Claude 실무 가이드 v2</div>
        <div class="brand-sub">4시간 · AI 경험자 심화 과정</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main">
    <header class="top">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="breadcrumb" id="breadcrumb">Home</div>
      <div class="font-ctrl">
        <button onclick="setFont(-1)">A-</button>
        <button class="active" onclick="setFont(0)">기본</button>
        <button onclick="setFont(1)">A+</button>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

      {id:"4-3", title:"서브에이전트 · 일을 위임하는 법",       type:"concept"},

  { num:"CH 05", title:"치트시트 · 30일 루틴", time:"3:40–4:00 · 20분",
    sections:[

const typeLabel = { opening:'오프닝', concept:'개념', practice:'실습', workshop:'워크샵', plat:'플랫폼' };
const typeClass  = { opening:'tag-opening', concept:'tag-concept', practice:'tag-practice', workshop:'tag-workshop', plat:'tag-plat' };

function promptBlock(title, content) {
  const id = 'pb-' + Math.random().toString(36).slice(2, 9);
  return '<div class="prompt-block">'
       +   '<div class="prompt-header">'
       +     '<span class="prompt-label">📝 ' + title + '</span>'
       +     '<button class="copy-btn" onclick="copyPrompt(this,\'' + id + '\')">복사</button>'
       +   '</div>'
       +   '<pre id="' + id + '" class="prompt-body">' + content + '</pre>'
       + '</div>';
}
function demo(title, desc) {
  return '<div class="demo-topic"><div class="tt">' + title + '</div><div class="dd">' + desc + '</div></div>';
}
function fileCard(name, size) {
  return '<div class="file-card"><div class="file-info"><h4>' + name + '</h4><p>' + size + '</p></div><span class="dl-btn" style="background:#bbaa95;cursor:not-allowed">준비 중</span></div>';
}
function copyPrompt(btn, id) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerText = '✓ 복사됨';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerText = '복사'; }, 1500);
  });
}

/* ===================== CORE SYSTEM ===================== */
function renderNav() {
  const nav = document.getElementById('nav');
  let html = '';
  chapters.forEach((c, ci) => {
    html += '<div class="nav-chapter' + (ci === 0 ? ' open' : '') + '">';
    html += '<div class="nav-chapter-header" onclick="toggleChapter(this)">';
    html +=   '<span class="ch-num">' + (c.num || ('CH ' + ci.toString().padStart(2,'0'))) + '</span>';
    html +=   '<span class="ch-title">' + c.title + '</span>';
    html +=   '<span class="ch-time">' + (c.time || '') + '</span>';
    html +=   '<span class="ch-caret">▾</span>';
    html += '</div>';
    html += '<div class="sections">';
    c.sections.forEach(s => {
      html += '<div class="section-item" data-id="' + s.id + '" onclick="go(\'' + s.id + '\')">';
      html +=   '<span class="dot"></span>';
      html +=   '<span class="title">' + s.title + '</span>';
      html +=   '<span class="tag ' + typeClass[s.type] + '">' + (s.label || typeLabel[s.type]) + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  nav.innerHTML = html;
}
function toggleChapter(el) { el.parentElement.classList.toggle('open'); }

function findSection(id) {
  for (const c of chapters) {
    for (const s of c.sections) if (s.id === id) return { chapter: c, section: s };
  }
  return null;
}
function flatSections() {
  const out = [];
  chapters.forEach(c => c.sections.forEach(s => out.push({ chapter: c, section: s })));
  return out;
}
function renderPage(id) {
  const content = document.getElementById('content');
  const bc = document.getElementById('breadcrumb');
  if (!pages[id]) { content.innerHTML = '<h1>페이지를 찾을 수 없습니다</h1>'; return; }
  content.innerHTML = pages[id];

  const found = findSection(id);
  if (found) {
    bc.innerHTML = '<span>' + found.chapter.title + '</span><span class="current">' + found.section.title + '</span>';
  }

  document.querySelectorAll('.section-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector('.section-item[data-id="' + id + '"]');
  if (active) {
    active.classList.add('active');
    active.closest('.nav-chapter').classList.add('open');
  }

  const flat = flatSections();
  const idx = flat.findIndex(x => x.section.id === id);
  const prev = idx > 0 ? flat[idx - 1] : null;
  const next = idx < flat.length - 1 ? flat[idx + 1] : null;
  let nav = '<div class="footer-nav">';
  nav += prev
    ? '<button class="nav-btn" onclick="go(\'' + prev.section.id + '\')">← ' + prev.section.title + '</button>'
    : '<button class="nav-btn disabled">← 처음</button>';
  nav += next
    ? '<button class="nav-btn next" onclick="go(\'' + next.section.id + '\')">' + next.section.title + ' →</button>'
    : '<button class="nav-btn next disabled">끝 →</button>';
  nav += '</div>';
  content.innerHTML += nav;
  window.scrollTo(0, 0);
}
function go(id) {
  location.hash = id;
  renderPage(id);
  if (window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('open');
}
function setFont(delta) {
  const sizes = [14, 15, 16];
  document.body.style.fontSize = sizes[delta + 1] + 'px';
  document.querySelectorAll('.font-ctrl button').forEach((b, i) => b.classList.toggle('active', i === delta + 1));
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

renderNav();
const initialId = (location.hash && location.hash.slice(1)) || (chapters[0] && chapters[0].sections[0] && chapters[0].sections[0].id) || '';
if (initialId) renderPage(initialId);
window.addEventListener('hashchange', () => renderPage(location.hash.slice(1)));
</script>
